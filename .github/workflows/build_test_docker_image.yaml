name: Manually Build Selected Docker Images

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "main"
      debug_version:
        description: "Enter the release version tag (e.g. 0.9.30). The built image will be tagged as xxx:0.9.30-amd64."
        required: true
      archs:
        description: "Target architectures (comma separated), e.g. linux/amd64,linux/arm64"
        required: false
        default: "linux/amd64"
      build_gotrue:
        description: "Build GoTrue image"
        type: boolean
        required: false
        default: false
      build_appflowy_cloud:
        description: "Build AppFlowy Cloud image"
        type: boolean
        required: false
        default: true
      build_admin_frontend:
        description: "Build Admin Frontend image"
        type: boolean
        required: false
        default: false
      build_appflowy_worker:
        description: "Build AppFlowy Worker image"
        type: boolean
        required: false
        default: true

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set up architecture matrix
        id: set-matrix
        run: |
          # Convert comma-separated archs to JSON array and extract arch names
          archs="${{ github.event.inputs.archs }}"
          # Replace linux/ prefix and convert to JSON array
          matrix_archs=$(echo "$archs" | sed 's/linux\///g' | sed 's/,/","/g' | sed 's/^/["/' | sed 's/$/"]/')
          echo "matrix={\"arch\":$matrix_archs}" >> $GITHUB_OUTPUT
          echo "Generated matrix: {\"arch\":$matrix_archs}"

  gotrue:
    runs-on: ubuntu-22.04
    needs: setup
    if: ${{ github.event.inputs.build_gotrue == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      DOCKERHUB_PUSH: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
      IMAGE_TAR: /tmp/gotrue-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}.tar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_PUSH == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push GoTrue image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/gotrue/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ env.DOCKERHUB_PUSH == 'true' }}
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          tags: |
            appflowyinc/gotrue:${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-internal

      - name: Upload GoTrue image artifact
        if: ${{ env.DOCKERHUB_PUSH != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: gotrue-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-image
          path: ${{ env.IMAGE_TAR }}

      - name: Logout from Docker Hub
        if: ${{ always() && env.DOCKERHUB_PUSH == 'true' }}
        run: docker logout

  appflowy_cloud:
    runs-on: ubuntu-22.04
    needs: setup
    if: ${{ github.event.inputs.build_appflowy_cloud == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      DOCKERHUB_PUSH: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME != '' && format('{0}/appflowy_cloud', secrets.DOCKER_HUB_USERNAME) || 'appflowy_cloud' }}
      IMAGE_TAR: /tmp/appflowy_cloud-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}.tar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_PUSH == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push AppFlowy Cloud image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: ${{ env.DOCKERHUB_PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-internal
          provenance: false
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          build-args: |
            PROFILE=release

      - name: Upload AppFlowy Cloud image artifact
        if: ${{ env.DOCKERHUB_PUSH != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: appflowy_cloud-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-image
          path: ${{ env.IMAGE_TAR }}

      - name: Logout from Docker Hub
        if: ${{ always() && env.DOCKERHUB_PUSH == 'true' }}
        run: docker logout

  admin_frontend:
    runs-on: ubuntu-22.04
    needs: setup
    if: ${{ github.event.inputs.build_admin_frontend == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      DOCKERHUB_PUSH: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME != '' && format('{0}/admin_frontend', secrets.DOCKER_HUB_USERNAME) || 'admin_frontend' }}
      IMAGE_TAR: /tmp/admin_frontend-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}.tar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_PUSH == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Admin Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./admin_frontend/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ env.DOCKERHUB_PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-internal
          provenance: false
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          build-args: |
            PROFILE=release

      - name: Upload Admin Frontend image artifact
        if: ${{ env.DOCKERHUB_PUSH != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: admin_frontend-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-image
          path: ${{ env.IMAGE_TAR }}

      - name: Logout from Docker Hub
        if: ${{ always() && env.DOCKERHUB_PUSH == 'true' }}
        run: docker logout

  appflowy_worker:
    runs-on: ubuntu-22.04
    needs: setup
    if: ${{ github.event.inputs.build_appflowy_worker == 'true' }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      DOCKERHUB_PUSH: ${{ secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
      IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME != '' && format('{0}/appflowy_worker', secrets.DOCKER_HUB_USERNAME) || 'appflowy_worker' }}
      IMAGE_TAR: /tmp/appflowy_worker-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}.tar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_PUSH == 'true' }}
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push AppFlowy Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/appflowy-worker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ env.DOCKERHUB_PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-internal
          provenance: false
          outputs: type=docker,dest=${{ env.IMAGE_TAR }}
          build-args: |
            PROFILE=release

      - name: Upload AppFlowy Worker image artifact
        if: ${{ env.DOCKERHUB_PUSH != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: appflowy_worker-${{ github.event.inputs.debug_version }}-${{ matrix.arch }}-image
          path: ${{ env.IMAGE_TAR }}

      - name: Logout from Docker Hub
        if: ${{ always() && env.DOCKERHUB_PUSH == 'true' }}
        run: docker logout